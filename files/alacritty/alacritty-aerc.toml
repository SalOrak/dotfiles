[terminal]

[env]
term = "screen-256color"
TERM = "screen-256color"
EDITOR = "nvim"
VISUAL = "nvim"

[font]
size = 20.0

[font.normal]
family = "Iosevka NF"

[scrolling]
history = 10000

[terminal.shell]
args = ["--login"]
program = "/run/current-system/sw/bin/bash"

[window] 
decorations = "none"
decorations_theme_variant = "Dark"
opacity = 1.0
startup_mode = "Maximized"

[window.padding]
x = 0
y = 0

[mouse]
hide_when_typing = true

# Kanagawa Wave Alacritty Colors
[general]
import=[
"alacritty-themes/miasma.toml"
# "alacritty-themes/miasma.toml" 
# "alacritty-themes/gruvbox_dark.toml" 
# "alacritty-themes/nightfly.toml" 
# "alacritty-themes/solarized_osaka.toml"
]
