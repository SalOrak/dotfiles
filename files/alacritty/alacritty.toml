[env]
TERM = "screen-256color"

[font]
size = 18.0

[font.normal]
family = "Iosevka NF"

[scrolling]
history = 10000

[terminal.shell]
args = ["--login"]
program = "/run/current-system/sw/bin/bash"

[window]
decorations = "Transparent"
decorations_theme_variant = "Dark"
opacity = 0.96
option_as_alt = "OnlyLeft"
startup_mode = "Maximized"

[window.padding]
x = 0
y = 10

[mouse]
hide_when_typing = true

[general]
import=[
	"alacritty-themes/catppuccin_mocha.toml" # <--- 1
]
